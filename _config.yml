# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# Language and timezone
lang: ko-KR  # 한국어로 변경
timezone: Asia/Seoul  # 정확한 타임존 입력

# SEO 및 블로그 기본 정보
title: 거북이의 개발 블로그
tagline: 개발, 알고리즘, 백엔드, 위성데이터를 담다
description: 알고리즘, 백엔드, 위성데이터, SAR, 지구관측 등 기술 공유 블로그
url: 'https://turtlekim322.github.io'

# GitHub 및 소셜 정보
github:
  username: TurtleKim322  # 사용자명 반영

twitter:
  username: your_twitter_username  # 사용 시 변경, 없으면 삭제 가능

social:
  name: 김동환
  email: turtlekim322@gmail.com
  links:
    - https://github.com/TurtleKim322
    # - https://twitter.com/your_twitter_username  # 사용 시 활성화
    # - https://linkedin.com/in/your_id  # 필요 시 추가

# SEO site verification (선택 사항, 사용 시 값 입력)
webmaster_verifications:
  google:
  bing:
  yandex:
  baidu:

# Web Analytics (사용 시 ID 입력)
analytics:
  google:
    id: G-XXXXXXXXXX  # 구글 애널리틱스 ID 입력
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Comments (원하면 giscus 추천)
comments:
  provider: giscus
  giscus:
    repo: TurtleKim322/turtlekim322.github.io
    repo_id: YOUR_REPO_ID  # giscus 웹사이트에서 복사
    category: General
    category_id: YOUR_CATEGORY_ID  # giscus에서 제공
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: ko
    reactions_enabled: 1

# Theme appearance
theme_mode: dark

# Avatar 및 CDN
avatar: "/commons/avatar.jpg"
cdn: "https://chirpy-img.netlify.app"

# PWA 설정
pwa:
  enabled: true
  cache:
    enabled: true

# 기본 설정
paginate: 10
baseurl: ""

# Markdown 설정
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# 카테고리/태그용 설정
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# 제외할 파일
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"
